name: polyglot_admin
description: "Parlo Admin — web dashboard for managing Parlo users, complaints and ratings."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.12.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State management & routing (same stack as the mobile app)
  flutter_riverpod: ^3.2.0
  go_router: ^17.1.0

  # Localization (slang — same as the mobile app)
  slang: ^4.15.0
  slang_flutter: ^4.15.0

  # Firebase (same project as the mobile app: parlo-ec41a)
  firebase_core: ^4.9.0
  firebase_auth: ^6.5.1
  cloud_firestore: ^6.4.1

  # Charts, persistence, value equality, formatting
  fl_chart: ^0.69.2
  shared_preferences: ^2.3.3
  equatable: ^2.0.8
  intl: ^0.20.2

  # Backend health check + CSV download (web)
  http: ^1.6.0
  web: ^1.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.15.0
  slang_build_runner: ^4.15.0

flutter:
  uses-material-design: true
